query CartLinesDiscountsGenerateRunInput {
  cart {
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }

  discount {
    metafield(namespace: "$app:promotions", key: "config") {
      value
    }
  }
}