# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c4b43eb51d6318e8af3400b6b5a7a264"
name = "Oban All-in-one Offers"
application_url = "https://all-in-one-promotions.onrender.com"
embedded = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/api/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "shop/update" ]
  uri = "/api/webhooks/shop/update"

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/api/webhooks/products/delete"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_discounts,read_products,write_discounts,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://all-in-one-promotions.onrender.com/auth/callback",
  "https://all-in-one-promotions.onrender.com/auth/shopify/callback"
]

[app_proxy]
url = "https://all-in-one-promotions.onrender.com"
subpath = "promotions"
prefix = "apps"

[pos]
embedded = false
